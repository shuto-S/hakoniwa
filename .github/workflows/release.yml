name: Release

# v* タグを push すると、macOS (Apple Silicon) 向けの .app を
# zip にして GitHub Releases に添付する
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package
      - name: Zip app bundle
        run: |
          cd "release/はこにわ-darwin-arm64"
          ditto -c -k --sequesterRsrc --keepParent "はこにわ.app" "../hakoniwa-${GITHUB_REF_NAME}-mac-arm64.zip"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/hakoniwa-${GITHUB_REF_NAME}-mac-arm64.zip" \
            --generate-notes \
            --notes "署名なしビルドのため、初回は右クリック→「開く」で起動してください。"
