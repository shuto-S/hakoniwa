<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 角丸背景(空色) -->
  <rect x="60" y="60" width="904" height="904" rx="200" fill="#8ecdf0"/>
  <!-- 六角ブロックの島: アイソメ風に3つ積む -->
  <!-- 土台(土) -->
  <g>
    <polygon points="512,760 292,650 292,530 512,640 732,530 732,650" fill="#7a5236"/>
    <polygon points="292,530 512,420 732,530 512,640" fill="#9a6a44"/>
  </g>
  <!-- 草ブロック -->
  <g>
    <polygon points="512,640 292,530 292,410 512,520 732,410 732,530" fill="#4f9642"/>
    <polygon points="292,410 512,300 732,410 512,520" fill="#6cc75a"/>
  </g>
  <!-- 上に小さい六角ブロック(レンガ) -->
  <g>
    <polygon points="512,430 402,375 402,285 512,340 622,285 622,375" fill="#a04a38"/>
    <polygon points="402,285 512,230 622,285 512,340" fill="#c06045"/>
  </g>
  <!-- 木(幹と葉) -->
  <g>
    <rect x="660" y="330" width="36" height="90" fill="#6a4a2e"/>
    <circle cx="678" cy="300" r="70" fill="#3f9c46"/>
    <circle cx="630" cy="340" r="45" fill="#4caf50"/>
    <circle cx="726" cy="340" r="45" fill="#4caf50"/>
  </g>
  <!-- 太陽 -->
  <circle cx="270" cy="250" r="60" fill="#f7d154"/>
</svg>
